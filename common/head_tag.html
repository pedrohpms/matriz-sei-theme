<!--
  Skeleton HTML da calculadora, migrado do <body> do index.html do protótipo
  standalone (pedrohpms/matriz-sei). Fica dentro de um <template>, portanto
  não é renderizado no DOM sozinho — é clonado por criarOverlayComCalculadora()
  no initializer, ao clicar no botão de rodapé "Avaliar". Tudo
  está escopado sob .matriz-sei-calc (ver common/common.scss) para não vazar
  estilo/IDs para o resto do ParticiPEN quando o template for clonado.
-->
<template id="matriz-sei-calc-template">
  <div class="matriz-sei-calc">
    <header class="topo">
      <h1>Matriz de priorização do SEI</h1>
      <!-- Versão em texto literal (não lida de about.json em runtime) —
           lembrar de atualizar junto com about.json.theme_version a cada release. -->
      <p class="subtitulo">
        v1.2.2 - GPSEI/DTGES, 2026
        Passo <strong id="progresso-atual">1</strong> de
        <strong id="progresso-total">6</strong>.
      </p>
    </header>

    <!-- Indicador de passos: passo atual + concluídos. Volta a passos
         anteriores sem perder dados. Renderizado pelo initializer. -->
    <nav class="stepper" aria-label="Progresso dos passos">
      <ol id="stepper-lista"></ol>
    </nav>

    <main>
      <!-- ============================================================ -->
      <!-- PASSO 1 — Identificação da demanda                           -->
      <!-- ============================================================ -->
      <section class="passo" data-passo="0">
        <h2>1. Identificação da demanda</h2>

        <!-- Aviso do resultado da extração automática: o initializer já leu
             o raw markdown do primeiro post via Store do Discourse ao abrir
             o modal (abrirCalculadoraParaTopico) e tentou popular os campos
             abaixo. Sem input manual de URL — não há mais chamada de rede
             própria da calculadora; o parser só roda sobre o post já
             carregado no fórum. -->
        <p id="topico-aviso" class="aviso" hidden role="status" aria-live="polite"></p>

        <!-- Carregar um exemplo pronto ou uma memória de cálculo exportada -->
        <div class="topico-loader">
          <label for="id-exemplo-file">Carregar exemplo ou memória salva (JSON)</label>
          <input type="file" id="id-exemplo-file" accept="application/json,.json" />
          <p id="exemplo-aviso" class="aviso" role="status" aria-live="polite" hidden></p>
          <p class="ajuda">
            Carrega um arquivo de memória de cálculo (JSON) e preenche o fluxo.
            Os casos prontos estão na pasta <code>exemplos/</code> do repositório standalone.
          </p>
        </div>

        <div class="campo">
          <label for="id-avaliador">Avaliador</label>
          <input type="text" id="id-avaliador" placeholder="Nome de quem está avaliando" />
        </div>

        <div class="campo">
          <label for="id-titulo">Título</label>
          <input type="text" id="id-titulo" placeholder="Título curto da demanda" />
        </div>

        <div class="campo">
          <label for="id-descricao">Descrição curta</label>
          <textarea id="id-descricao" rows="3"
            placeholder="O que é a demanda, em poucas linhas"></textarea>
        </div>

        <div class="campo">
          <label for="id-link">Link público (opcional)</label>
          <input type="url" id="id-link" placeholder="https://…" />
        </div>

        <div class="campo">
          <label for="id-natureza">Natureza do input</label>
          <select id="id-natureza"></select>
          <ul class="tooltip-opcoes" id="natureza-tips"></ul>
        </div>

        <div class="campo">
          <label for="id-trilha">Trilha</label>
          <select id="id-trilha"></select>
        </div>

        <div class="campo">
          <label for="id-camada">Camada proposta</label>
          <select id="id-camada"></select>
        </div>

        <div class="campo">
          <label for="id-dependencias">Dependências</label>
          <textarea id="id-dependencias" rows="2"
            placeholder="Dependências técnicas ou normativas (texto livre)"></textarea>
        </div>

        <div class="campo">
          <label for="id-evidencia">Evidência</label>
          <textarea id="id-evidencia" rows="2"
            placeholder="Evidências ou métricas trazidas pelo solicitante"></textarea>
        </div>
      </section>

      <!-- ============================================================ -->
      <!-- PASSO 2 — Triagem (ato vinculado / piso)                    -->
      <!-- ============================================================ -->
      <section class="passo" data-passo="1" hidden>
        <h2>2. Triagem — ato vinculado</h2>
        <p class="ajuda">
          O <strong>ato vinculado</strong> é uma obrigação normativa: a norma
          manda, sem juízo discricionário. Marque os gatilhos acionados — se
          qualquer um for marcado, a demanda fica fora da matriz discricionária
          (encaminhamento direto ao topo da fila), pulando a pontuação.
          <strong>Se não for ato vinculado, deixe tudo em branco e avance.</strong>
        </p>
        <div id="triagem-gatilhos" class="grupo-checkbox"></div>
        <p id="triagem-aviso" class="aviso alerta" role="status" aria-live="polite" hidden></p>
      </section>

      <!-- ============================================================ -->
      <!-- PASSO 3 — Curadoria de camada                                -->
      <!-- ============================================================ -->
      <section class="passo" data-passo="2" hidden>
        <h2>3. Curadoria de camada</h2>
        <p class="ajuda">
          Camada proposta no Passo 1:
          <strong id="curadoria-proposta">—</strong>.
          Confirme ou redirecione. A camada validada estabelece o piso da nota
          de Complexidade no Passo 5 (complexidade mínima plausível).
        </p>
        <div class="campo">
          <label for="curadoria-camada">Camada validada</label>
          <select id="curadoria-camada"></select>
          <ul class="tooltip-opcoes" id="camada-tips"></ul>
        </div>
      </section>

      <!-- ============================================================ -->
      <!-- PASSO 4 — Avaliação de valor (bloco Valor)                   -->
      <!-- ============================================================ -->
      <section class="passo" data-passo="3" hidden>
        <h2>4. Avaliação de valor</h2>
        <p class="ajuda">
          Quanto a demanda entrega de valor — <strong>ordena a fila</strong> (0–12).
          Escolha um descritor por critério. Subtotal:
          <strong id="subtotal-valor" class="score-live">0/12</strong>
        </p>
        <div id="criterios-valor"></div>
      </section>

      <!-- ============================================================ -->
      <!-- PASSO 5 — Avaliação de risco (bloco Esforço de entrega)      -->
      <!-- ============================================================ -->
      <section class="passo" data-passo="4" hidden>
        <h2>5. Avaliação de risco</h2>
        <p class="ajuda">
          O esforço e o risco de entrega — <strong>orientam o tratamento e
          desempatam</strong> (menor primeiro; 0–8): complexidade e risco de
          entrega. Subtotal:
          <strong id="subtotal-esforco" class="score-live">0/8</strong>
        </p>
        <div id="criterios-risco"></div>

        <!-- Override do piso de Complexidade (revelado quando a nota fica abaixo do piso) -->
        <div id="override-complexidade" class="override-box" hidden>
          <p id="override-alerta" class="aviso alerta" aria-live="polite"></p>
          <div class="campo">
            <label for="override-justificativa">
              Justificativa do override <span class="obrigatorio">(obrigatória)</span>
            </label>
            <textarea id="override-justificativa" rows="3"
              placeholder="Por que a complexidade real é menor do que o típico desta camada?"></textarea>
          </div>
          <p id="override-pendencia" class="ajuda" role="alert" hidden>
            Preencha a justificativa do override antes de avançar.
          </p>
        </div>
      </section>

      <!-- ============================================================ -->
      <!-- PASSO 6 — Memória de cálculo                                 -->
      <!-- ============================================================ -->
      <section class="passo" data-passo="5" hidden>
        <h2>6. Memória de cálculo</h2>

        <!-- Plotagem valor × esforço (no início do passo). Sob ato vinculado dá lugar ao card. -->
        <div id="plotagem-bloco">
          <h3 class="plotagem-titulo">Plotagem em quadrantes</h3>
          <div id="plotagem-svg" class="plotagem-svg" role="img"
               aria-label="Posição da demanda na matriz valor × esforço"></div>
          <p id="plotagem-nota" class="plotagem-nota">
            Linhas de corte: valor ≥ 6 alto, esforço ≥ 4 alto (convenção revisável).
          </p>
          <button type="button" id="btn-baixar-png" class="secundario">Baixar como PNG</button>
          <button type="button" id="btn-baixar-svg" class="secundario">Baixar como SVG</button>
        </div>
        <div id="plotagem-piso-card" class="piso-card" role="status" hidden></div>

        <p id="memoria-desfecho" class="aviso" role="status" aria-live="polite" hidden></p>

        <p class="ajuda">
          <strong>Postar avaliação</strong> publica no tópico do ParticiPEN (com
          a plotagem como imagem). <strong>Copiar para o Planner</strong> copia
          em formato rico (Microsoft); <strong>Baixar JSON</strong> arquiva o
          registro.
        </p>
        <div class="acoes-memoria">
          <button type="button" id="btn-postar-avaliacao">Postar avaliação</button>
          <button type="button" id="btn-copiar-planner">Copiar para o Planner</button>
          <button type="button" id="btn-baixar-json">Baixar JSON</button>
          <button type="button" id="btn-regenerar" class="secundario">Regenerar</button>
          <span id="copia-feedback" class="feedback" role="status"></span>
        </div>
        <textarea id="memoria-saida" rows="22" readonly
          aria-label="Memória de cálculo em Markdown"></textarea>
      </section>
    </main>

    <!-- Navegação fixa -->
    <footer class="rodape-nav">
      <button type="button" id="btn-voltar">← Voltar</button>
      <span class="score-rodape"><strong id="score-rodape">Valor 0/12 · Esforço 0/8</strong></span>
      <button type="button" id="btn-avancar">Avançar →</button>
    </footer>
  </div>
</template>
